name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      uses: coactions/setup-xvfb@v1
      with:
        run: npm test
        options: -screen 0 1024x768x24

    - name: Build extension
      run: npm run package

    - name: Package extension
      run: |
        npm install -g @vscode/vsce
        vsce package --no-dependencies

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## Changes in v${{ steps.get_version.outputs.VERSION }}

          ### Features
          - UI Flow Editor with Mermaid.js rendering
          - Interactive zoom and pan functionality
          - HTML export capabilities
          - Japanese language support

          ### Technical Details
          - Mermaid.js v11.12.0
          - TypeScript compilation with DOM support
          - Comprehensive test suite
          - VS Code Extension compatibility

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./*.vsix
        asset_name: ui-flow-editor-${{ steps.get_version.outputs.VERSION }}.vsix
        asset_content_type: application/octet-stream

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension
      run: npm run package

    - name: Publish to VS Code Marketplace
      run: |
        npm install -g @vscode/vsce
        vsce publish --no-dependencies -p ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
      env:
        VSCODE_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}